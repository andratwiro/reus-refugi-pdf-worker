name = "reus-refugi-pdf-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Static assets — les plantilles PDF viuen dins del bundle del Worker.
# Accessibles en runtime via env.ASSETS.fetch().
#   - EX31_oficial.pdf, EX31_seccion5.pdf
#   - EX32_oficial.pdf, EX32_seccion5.pdf
#   - A2_certificado_vulnerabilidad.pdf      ← nou (Anexo II express)
#
# IMPORTANT: tot el que viu a ./assets/ s'exposa públicament a la URL del
# worker (https://reus-refugi-pdf-worker.workers.dev/<filename>). NO posis
# aquí binaris que no siguin segurs de ser públics — els PDFs templates són
# tots oficials del Govern espanyol, descarregables lliurement.
[assets]
directory = "./assets"
binding = "ASSETS"

# Private binaries — el segell de l'entitat i la firma del representant viuen
# a un KV namespace (NO al repo). Es llegeixen a runtime amb keys
# "entity-stamp" i "representative-signature" (PNG bytes). Si el binding o
# alguna key no existeix, el certificat A2 es genera sense aquell element
# (no falla).
#
# NO es poden empotrar al bundle del worker (com es feia abans amb
# `[[rules]] type="Data"`) perquè els fitxers font són gitignored: el build
# de Cloudflare Workers Builds no els tindria al checkout i fallaria.
#
# Setup d'una vegada — vegeu src/private/README.md per a instruccions
# completes. En resum:
#   1. npx wrangler kv namespace create PRIVATE_BINARIES
#   2. Copia l'ID retornat al bloc [[kv_namespaces]] de sota i descomenta'l.
#   3. Puja els PNGs amb `wrangler kv key put`.
#
[[kv_namespaces]]
binding = "PRIVATE_BINARIES"
id = "b02bf2982239407f836a23afe1d230bd"

# Logs & observability
[observability]
enabled = true

# Secrets — NO van aquí. Configurar via:
#   npx wrangler secret put AIRTABLE_TOKEN
#   npx wrangler secret put SHARED_SECRET
#   npx wrangler secret put GAS_WEBAPP_URL
#   npx wrangler secret put GAS_SHARED_SECRET
#
# Presentador config (dades personals del representant acreditat — NO les
# fiquis a [vars]; aquest fitxer es committeja al repo públic):
#   npx wrangler secret put PRESENTADOR_NOMBRE   # "COGNOM1 COGNOM2 NOM" majúscules
#   npx wrangler secret put PRESENTADOR_NIE
#   npx wrangler secret put PRESENTADOR_TIPODOC  # NF (NIE) | NV (DNI) | PA (passaport)
#   npx wrangler secret put PRESENTADOR_MOBIL
#   npx wrangler secret put PRESENTADOR_EMAIL
#
# (O via dashboard: Workers → reus-refugi-pdf-worker → Settings → Variables and Secrets)

[vars]
# Base Venus (mateixa base per Casos i Informes de Vulnerabilitat)
AIRTABLE_BASE_ID = "appWuXncpGWaFTR4M"

# Taula Casos (/generate)
CASOS_TABLE_ID = "tblaz9eNKzTI7YbM2"
DOSSIER_FIELD_ID = "fldVBsux4CdQkELmg"

# Taula Informes de Vulnerabilitat (/anexo2)
INFORMES_VULN_TABLE_ID = "tblO0n6QksMeXLX3m"
INFORMES_VULN_PDF_FIELD = "fldbSmX0DxlCdSS2O"          # "Informe generat" (multipleAttachments)
INFORMES_VULN_GENERATED_AT_FIELD = "fld3kRIFhpmVNDBFO" # "Generat el" (dateTime Europe/Madrid)
